apiVersion: v1
kind: ConfigMap
metadata:
  name: yunxi-agent-platform-config
  namespace: yunxi-agent-platform
  labels:
    app.kubernetes.io/name: yunxi-agent-platform
data:
  application.yml: |
    server:
      port: 40001
    
    spring:
      application:
        name: yunxi-agent-platform
      profiles:
        active: prod
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          probes:
            enabled: true
          show-details: when-authorized
      metrics:
        tags:
          application: ${spring.application.name}
    
    gateway:
      session:
        store-type: sqlite
        db-path: /app/data/sessions.db
        cleanup-interval-seconds: 300
        ttl-seconds: 86400

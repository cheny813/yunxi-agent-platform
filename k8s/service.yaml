apiVersion: v1
kind: Service
metadata:
  name: yunxi-agent-platform
  namespace: yunxi-agent-platform
  labels:
    app.kubernetes.io/name: yunxi-agent-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 40001
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: yunxi-agent-platform
---
apiVersion: v1
kind: Service
metadata:
  name: yunxi-agent-platform-metrics
  namespace: yunxi-agent-platform
  labels:
    app.kubernetes.io/name: yunxi-agent-platform
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: yunxi-agent-platform

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yunxi-agent-platform.fullname" . }}
  labels:
    {{- include "yunxi-agent-platform.labels" . | nindent 4 }}
data:
  application.yml: |
    server:
      port: 40001
    
    spring:
      application:
        name: {{ include "yunxi-agent-platform.name" . }}
      profiles:
        active: {{ .Values.config.spring.profiles.active }}
    
    management:
      endpoints:
        web:
          exposure:
            include: {{ .Values.config.management.endpoints.web.exposure.include }}
      endpoint:
        health:
          probes:
            enabled: {{ .Values.config.management.endpoint.health.probes.enabled }}
      metrics:
        tags:
          application: ${spring.application.name}
    
    gateway:
      session:
        store-type: {{ .Values.config.gateway.session.storeType }}
        db-path: {{ .Values.config.gateway.session.dbPath }}
        cleanup-interval-seconds: {{ .Values.config.gateway.session.cleanupIntervalSeconds }}
        ttl-seconds: {{ .Values.config.gateway.session.ttlSeconds }}

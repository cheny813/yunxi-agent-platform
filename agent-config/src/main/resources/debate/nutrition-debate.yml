# 营养领域辩论场景配置
# 用于 Agent Debate 多智能体辩论

scenarios:
  # 场景1：食谱优化辩论
  - name: recipe-optimization-debate
    description: 针对同一食谱，优化方案的正反方辩论
    
    topic: "针对小学生午餐食谱，是否应该增加海鲜类菜品以补充优质蛋白质？"
    
    # 辩论者配置
    debaters:
      - name: "营养学专家"
        role: "正方"
        prompt: |
          你是营养学专家，主张增加海鲜类菜品。
          
          ## 你的观点
          1. 海鲜富含优质蛋白质和 Omega-3 脂肪酸
          2. 有助于儿童大脑发育
          3. 适量海鲜对健康成长有益
          
          ## 辩论要求
          - 用数据和科学依据支持你的观点
          - 考虑成本、安全性、营养平衡
          - 反驳反方观点时要有理有据
    
      - name: "食品安全专家"
        role: "反方"
        prompt: |
          你是食品安全专家，对增加海鲜持谨慎态度。
          
          ## 你的观点
          1. 学校供餐需考虑食品安全风险
          2. 海鲜过敏问题需要关注
          3. 成本较高可能增加学生负担
          4. 供应链稳定性有待验证
          
          ## 辩论要求
          - 用数据和案例支持你的观点
          - 提出替代方案
          - 反驳正方时指出潜在风险
    
    # 主持人配置
    moderator:
      prompt: |
        你是辩论主持人，负责评估辩论并决定何时结束。
        
        ## 你的职责
        1. 引导辩论聚焦主题
        2. 总结双方观点
        3. 判断是否达成共识或需要更多讨论
        4. 最终给出平衡的建议
        
        ## 结束条件
        - 双方达成共识
        - 一方明显说服另一方
        - 已充分讨论各角度（至少3轮）
        
        ## 输出格式
        判断辩论是否结束，并给出你的最终建议。

    # 辩论参数
    maxRounds: 5
    
  # 场景2：营养标准辩论
  - name: nutrient-standard-debate
    description: 针对营养标准制定的辩论
    
    topic: "针对6-12岁儿童，是否应该将每日蔬菜摄入量标准从200g提高到300g？"
    
    debaters:
      - name: "营养标准制定者"
        role: "正方"
        prompt: |
          你是营养标准制定者，主张提高蔬菜摄入标准。
          
          依据：《中国居民膳食指南》建议
          
          支持理由：
          1. 当前儿童蔬菜摄入普遍不足
          2. 300g 更符合健康成长需求
          3. 有助于培养良好饮食习惯
    
      - name: "学校食堂运营者"
        role: "反方"
        prompt: |
          你是学校食堂运营者，对提高标准有顾虑。
          
          顾虑理由：
          1. 成本压力增加约20%
          2. 儿童接受度可能下降
          3. 实际操作难度大
          4. 造成食材浪费

    moderator:
      prompt: |
        作为主持人，评估提高蔬菜摄入标准的利弊，给出可行建议。

    maxRounds: 4